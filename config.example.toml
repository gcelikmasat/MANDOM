# Copy to `config.toml` to override defaults. All keys are optional.

# Where finished books are written (one subfolder per manga).
# export_dir = "downloads"

# Working area for raw page images + local cache/DB.
# data_dir = "data"

# Output filename template. Tokens: {num} {num_padded} {manga} {title}
# {volume} {group} {lang}. Default zero-pads the chapter number so files
# sort 1..N. Example output: 0007_jojos-bizarre-adventure-part8.cbz
# filename_template = "{num_padded}_{manga}"
# number_padding = 4

# "chapter" (default, one book per chapter) or "volume".
# bundling = "chapter"

# Download politeness — stay under MangaDex's ~5 req/s global ceiling.
# max_concurrency = 4
# requests_per_second = 4.0

# Target device profile for KEPUB export (Phase 5).
# device_profile = "clara_colour"
