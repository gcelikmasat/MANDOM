{% extends "base.html" %}
{% block title %}Library — Mandom{% endblock %}
{% block content %}

<section class="panel glass">
  <div class="panel-head">
    <h2>Your Library <span class="count">{{ library|length }}</span></h2>
    <button class="btn btn-primary btn-sm"
            hx-post="/library/check-all"
            hx-target="#library-grid"
            hx-swap="outerHTML"
            hx-indicator="#check-spin">↻ Update all</button>
    <span id="check-spin" class="spin htmx-indicator">checking for new chapters&hellip;</span>
  </div>
  {% include "partials/_library_grid.html" %}
</section>

<section class="panel glass">
  <h2>Downloads</h2>
  <div id="downloads" hx-get="/downloads" hx-trigger="load, every 2s"></div>
</section>

{% endblock %}
