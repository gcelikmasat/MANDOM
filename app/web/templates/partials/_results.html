{% if not results %}
  <p class="hint">No results. Try another title.</p>
{% endif %}
{% for m in results %}
  <article class="card">
    <a href="/manga/{{ m.provider_id }}/{{ m.external_id }}" class="card-cover">
      {% if m.cover_url %}<img loading="lazy" src="/cover?url={{ m.cover_url|urlencode }}" alt="">{% endif %}
    </a>
    <div class="card-body">
      <a class="card-title" href="/manga/{{ m.provider_id }}/{{ m.external_id }}">{{ m.title }}</a>
      {% set is_saved = m.external_id in bookmarked %}
      {% include "partials/_bookmark_button.html" %}
    </div>
  </article>
{% endfor %}
